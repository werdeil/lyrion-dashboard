name: Web CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  javascript:
    name: Lint page scripts (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      # The flat config (eslint.config.mjs) is dependency-free, so a bare
      # npx eslint is all it takes — no package.json needed.
      - name: Run ESLint
        run: npx --yes eslint@9 static/*.js

  shell:
    name: Lint shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # shellcheck is preinstalled on ubuntu runners.
      - name: Run shellcheck
        run: shellcheck scripts/*.sh
