name: Python CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run syntax check
        run: python -m compileall .

      - name: Run unit tests
        run: |
          python - <<'PY'
          import sys
          import unittest

          suite = unittest.defaultTestLoader.discover('.')
          if suite.countTestCases() == 0:
              print('No tests found, skipping.')
              sys.exit(0)

          result = unittest.TextTestRunner(verbosity=2).run(suite)
          sys.exit(not result.wasSuccessful())
          PY

  security:
    name: Security (pip-audit + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      # Install the real dependency tree so pip-audit checks transitive
      # dependencies too (werkzeug, urllib3, ...) — that's where most CVEs
      # land, and requirements.txt only pins the top level.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-cli.txt
          pip install pip-audit bandit

      - name: Audit dependencies for known CVEs (pip-audit)
        run: pip-audit

      # Known, accepted findings carry an inline `# nosec` with justification
      # (see the security audit in PR #15); anything new fails the job.
      - name: Scan code for dangerous patterns (bandit)
        run: bandit -r . -x ./tests

  lint:
    name: Lint (pylint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      # Both requirements files plus playwright so every import in the linted
      # tree resolves (scripts/ needs mutagen and playwright); no browser
      # download needed just to lint.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-cli.txt playwright pylint

      - name: Run pylint
        run: pylint app.py config.py i18n.py routes services scripts tests
